<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>와쿠와쿠 잡화 상단 SHOP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh;-webkit-tap-highlight-color:transparent}
a{text-decoration:none;color:inherit}
.header{background:#111;border-bottom:1px solid #222;padding:16px 20px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo{font-size:20px;font-weight:700;color:#ff4b4b;letter-spacing:-0.5px}
.logo span{color:#fff}
.badge{background:#ff4b4b;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:0.5px}
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap input{width:100%;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:10px;padding:10px 14px 10px 38px;color:#f0f0f0;font-size:14px;font-family:inherit;outline:none;transition:border 0.2s}
.search-wrap input:focus{border-color:#ff4b4b}
.search-wrap input::placeholder{color:#555}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#555;font-size:16px;pointer-events:none}
.cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;-ms-overflow-style:none}
.cats::-webkit-scrollbar{display:none}
.cat-btn{white-space:nowrap;padding:7px 16px;border-radius:20px;border:1px solid #2a2a2a;background:transparent;color:#888;font-size:13px;font-family:inherit;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.cat-btn.active{background:#ff4b4b;border-color:#ff4b4b;color:#fff;font-weight:500}
.main{padding:16px 16px 100px;max-width:600px;margin:0 auto}
.count-bar{font-size:12px;color:#555;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.empty{text-align:center;padding:60px 20px;color:#444;font-size:14px}
.card{background:#1a1a1a;border:1px solid #242424;border-radius:14px;overflow:hidden;transition:transform 0.15s,border-color 0.2s}
.card:active{transform:scale(0.97)}
.card-img{width:100%;aspect-ratio:1;background:#222;display:flex;align-items:center;justify-content:center;font-size:42px;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-body{padding:10px 12px 14px}
.card-cat{font-size:10px;color:#ff4b4b;font-weight:500;letter-spacing:0.3px;margin-bottom:4px}
.card-name{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:36px}
.card-price{font-size:16px;font-weight:700;color:#ff4b4b;margin-bottom:10px}
.buy-btn{display:block;width:100%;padding:9px;background:#ff4b4b;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;text-align:center;transition:background 0.2s}
.buy-btn:active{background:#cc3333}
.footer{text-align:center;padding:20px;font-size:11px;color:#333;line-height:1.6;border-top:1px solid #1a1a1a;max-width:600px;margin:0 auto}
.footer a{color:#555;text-decoration:underline}
@media(min-width:500px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){.header{padding:16px 24px}.main{padding:20px 24px 100px}.grid{grid-template-columns:repeat(4,1fr)}}
</style>

  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="제품 검색..." oninput="render()">
  </div>
  <div class="cats" id="catBar"></div>
</div>

<div class="main">
  <div class="count-bar" id="countLabel"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">검색 결과가 없습니다</div>

  <a href="https://www.youtube.com/@이상한물건연구소" target="_blank">유튜브 채널 바로가기</a>

  {name:"스포츠 조거팬츠 남성", cat:"패션/의류", price:"19,900원", link:"https://link.coupang.com/a/여기에링크", emoji:"👖"},
  {name:"캔버스 스니커즈 클래식", cat:"패션/의류", price:"24,900원", link:"https://link.coupang.com/a/여기에링크", emoji:"👟"},

  {name:"전동 칫솔 음파 진동 IPX7", cat:"뷰티/헬스", price:"15,900원", link:"https://link.coupang.com/a/여기에링크", emoji:"🪥"},
  {name:"단백질 쉐이커 보틀 600ml", cat:"뷰티/헬스", price:"7,900원", link:"https://link.coupang.com/a/여기에링크", emoji:"🥤"},
  {name:"폼롤러 마사지 스틱", cat:"뷰티/헬스", price:"13,500원", link:"https://link.coupang.com/a/여기에링크", emoji:"💪"},

  {name:"프로틴바 단백질바 12개입", cat:"식품/음료", price:"16,800원", link:"https://link.coupang.com/a/여기에링크", emoji:"🍫"},

  {name:"블랙박스 전후방 FHD", cat:"자동차/바이크", price:"69,900원", link:"https://link.coupang.com/a/여기에링크", emoji:"📹"},
  {name:"차량용 방향제 디퓨저", cat:"자동차/바이크", price:"9,500원", link:"https://link.coupang.com/a/여기에링크", emoji:"🌿"},

  {name:"아이패드 필기감 종이질감 필름", cat:"도서/문구", price:"8,900원", link:"https://link.coupang.com/a/여기에링크", emoji:"📝"},
  {name:"다이어리 플래너 6공 바인더", cat:"도서/문구", price:"11,500원", link:"https://link.coupang.com/a/여기에링크", emoji:"📒"},
  {name:"형광펜 파스텔 6색 세트", cat:"도서/문구", price:"4,500원", link:"https://link.coupang.com/a/여기에링크", emoji:"✏️"},

  {name:"고양이 자동 급수기 2L", cat:"반려동물", price:"23,900원", link:"https://link.coupang.com/a/여기에링크", emoji:"🐱"},
  {name:"강아지 노즈워크 매트", cat:"반려동물", price:"14,900원", link:"https://link.coupang.com/a/여기에링크", emoji:"🐶"},
  {name:"반려동물 이동 캐리어 백팩", cat:"반려동물", price:"34,900원", link:"https://link.coupang.com/a/여기에링크", emoji:"🎒"},

  {name:"캠핑 접이식 의자 경량", cat:"스포츠/아웃도어", price:"18,900원", link:"https://link.coupang.com/a/여기에링크", emoji:"⛺"},
  {name:"등산 스틱 카본 접이식", cat:"스포츠/아웃도어", price:"29,900원", link:"https://link.coupang.com/a/여기에링크", emoji:"🏔️"},

  {name:"아기 물티슈 캡형 80매 10팩", cat:"유아/출산", price:"12,900원", link:"https://link.coupang.com/a/여기에링크", emoji:"👶"},
  {name:"유아 실리콘 턱받이 2개입", cat:"유아/출산", price:"8,500원", link:"https://link.coupang.com/a/여기에링크", emoji:"🍼"},
  {name:"어린이 목욕 장난감 세트", cat:"유아/출산", price:"11,200원", link:"https://link.coupang.com/a/여기에링크", emoji:"🛁"}
];

/* ━━━━━ 아래는 건드리지 마세요 ━━━━━ */

var catOrder = ["전체","컴퓨터/전자","가전/디지털","홈/리빙","게임/취미","패션/의류","뷰티/헬스","식품/음료","자동차/바이크","도서/문구","반려동물","스포츠/아웃도어","유아/출산"];
var activeCat = "전체";

function render() {
  var q = document.getElementById("searchInput").value.toLowerCase();
  var usedCats = {};
  var i;
  for (i = 0; i < products.length; i++) { usedCats[products[i].cat] = true; }
  var cats = [];
  for (i = 0; i < catOrder.length; i++) {
    if (catOrder[i] === "전체" || usedCats[catOrder[i]]) cats.push(catOrder[i]);
  }

  var catHtml = "";
  for (i = 0; i < cats.length; i++) {
    var c = cats[i];
    catHtml += "<button class=\"cat-btn" + (c === activeCat ? " active" : "") + "\" onclick=\"setCat('" + c + "')\">" + c + "</button>";
  }
  document.getElementById("catBar").innerHTML = catHtml;

  var filtered = [];
  for (i = 0; i < products.length; i++) {
    var p = products[i];
    var matchCat = (activeCat === "전체") || (p.cat === activeCat);
    var matchQ = !q || p.name.toLowerCase().indexOf(q) >= 0 || p.cat.toLowerCase().indexOf(q) >= 0;
    if (matchCat && matchQ) filtered.push(p);
  }

  document.getElementById("countLabel").textContent = "전체 " + filtered.length + "개 제품";

  var grid = document.getElementById("grid");
  var empty = document.getElementById("empty");

  if (filtered.length === 0) {
    grid.style.display = "none";
    empty.style.display = "block";
  } else {
    grid.style.display = "grid";
    empty.style.display = "none";
  }

  var html = "";
  for (i = 0; i < filtered.length; i++) {
    var item = filtered[i];
    var imgPart = "";
    if (item.img) {
      imgPart = "<img src=\"" + item.img + "\" alt=\"\">";
    } else {
      imgPart = item.emoji || "📦";
    }
    var btnText = (item.btn || "쿠팡") + "에서 보기 →";
    html += "<div class=\"card\">";
    html += "<div class=\"card-img\">" + imgPart + "</div>";
    html += "<div class=\"card-body\">";
    html += "<div class=\"card-cat\">" + item.cat + "</div>";
    html += "<div class=\"card-name\">" + item.name + "</div>";
    html += "<div class=\"card-price\">" + item.price + "</div>";
    html += "<a class=\"buy-btn\" href=\"" + item.link + "\" target=\"_blank\" rel=\"noopener noreferrer\">" + btnText + "</a>";
    html += "</div></div>";
  }
  grid.innerHTML = html;
}

function setCat(c) {
  activeCat = c;
  render();
}

render();
</script>
</body>
</html>
