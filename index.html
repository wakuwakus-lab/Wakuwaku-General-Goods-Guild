<head>
<meta charset="UTF-8">

<title>와쿠와쿠 잡화 상단 SHOP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh;-webkit-tap-highlight-color:transparent}
a{text-decoration:none;color:inherit}
.header{background:#111;border-bottom:1px solid #222;padding:16px 20px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo{font-size:20px;font-weight:700;color:#ff4b4b;letter-spacing:-0.5px}
.logo span{color:#fff}
.badge{background:#ff4b4b;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:0.5px}
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap input{width:100%;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:10px;padding:10px 14px 10px 38px;color:#f0f0f0;font-size:14px;font-family:inherit;outline:none;transition:border 0.2s}
.search-wrap input:focus{border-color:#ff4b4b}
.search-wrap input::placeholder{color:#555}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#555;font-size:16px;pointer-events:none}
.cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;-ms-overflow-style:none}
.cats::-webkit-scrollbar{display:none}
.cat-btn{white-space:nowrap;padding:7px 16px;border-radius:20px;border:1px solid #2a2a2a;background:transparent;color:#888;font-size:13px;font-family:inherit;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.cat-btn.active{background:#ff4b4b;border-color:#ff4b4b;color:#fff;font-weight:500}
.main{padding:16px 16px 100px;max-width:600px;margin:0 auto}
.count-bar{font-size:12px;color:#555;margin-bottom:12px}
.section-title{font-size:16px;font-weight:700;color:#f0f0f0;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #ff4b4b;display:flex;align-items:center;gap:8px}
.section-title .icon{font-size:18px}
.section-title .sub{font-size:11px;color:#666;font-weight:400;margin-left:auto}
.section{margin-bottom:36px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.empty{text-align:center;padding:60px 20px;color:#444;font-size:14px}
.card{background:#1a1a1a;border:1px solid #242424;border-radius:14px;overflow:hidden;transition:transform 0.15s,border-color 0.2s}
.card:active{transform:scale(0.97)}
.card-img{width:100%;aspect-ratio:1;background:#222;display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-body{padding:8px 10px 12px}
.card-cat{font-size:9px;color:#ff4b4b;font-weight:500;letter-spacing:0.3px;margin-bottom:3px}
.card-name{font-size:12px;font-weight:500;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:34px}
.card-price{font-size:15px;font-weight:700;color:#ff4b4b;margin-bottom:4px}
.card-views{font-size:10px;color:#888;margin-bottom:6px;display:flex;align-items:center;gap:3px}
.card-views .dot{color:#ff4b4b;font-size:6px}
.card-actions{display:flex;gap:6px;margin-bottom:8px}
.like-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:3px;padding:6px;background:#222;border:1px solid #333;border-radius:6px;color:#888;font-size:11px;font-family:inherit;cursor:pointer;transition:all 0.2s}
.like-btn.liked{background:#2a1520;border-color:#ff4b4b;color:#ff4b4b}
.like-btn .heart{font-size:13px;transition:transform 0.2s}
.like-btn.liked .heart{transform:scale(1.2)}
.cart-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:3px;padding:6px;background:#222;border:1px solid #333;border-radius:6px;color:#888;font-size:11px;font-family:inherit;cursor:pointer;transition:all 0.2s}
.cart-btn.in-cart{background:#1a2520;border-color:#4bff7b;color:#4bff7b}
.card-rank{position:absolute;top:6px;left:6px;background:rgba(0,0,0,0.7);color:#ff4b4b;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px}
.card-new{position:absolute;top:6px;right:6px;background:#ff4b4b;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px}
.card-img-wrap{position:relative}
.buy-btn{display:block;width:100%;padding:8px;background:#ff4b4b;color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;text-align:center;transition:background 0.2s}
.buy-btn:active{background:#cc3333}
.more-btn{display:block;width:100%;padding:12px;background:transparent;border:1px solid #333;border-radius:10px;color:#888;font-size:13px;font-family:inherit;cursor:pointer;text-align:center;margin-top:12px;transition:all 0.2s}
.more-btn:hover{border-color:#ff4b4b;color:#ff4b4b}
.cart-float{position:fixed;bottom:20px;right:20px;background:#ff4b4b;color:#fff;border:none;width:56px;height:56px;border-radius:50%;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(255,75,75,0.4);display:flex;align-items:center;justify-content:center;z-index:200;transition:transform 0.2s}
.cart-float:active{transform:scale(0.9)}
.cart-float .cart-count{position:absolute;top:-2px;right:-2px;background:#fff;color:#ff4b4b;font-size:11px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cart-panel-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;display:none;align-items:flex-end;justify-content:center}
.cart-panel-bg.open{display:flex}
.cart-panel{background:#1a1a1a;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:500px;max-height:70vh;overflow-y:auto}
.cart-panel h3{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.cart-panel h3 span{margin-left:auto;font-size:12px;color:#888;font-weight:400;cursor:pointer}
.cart-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #242424}
.cart-item-img{width:50px;height:50px;border-radius:8px;background:#222;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;flex-shrink:0}
.cart-item-img img{width:100%;height:100%;object-fit:cover}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:12px;font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-price{font-size:13px;font-weight:700;color:#ff4b4b}
.cart-item-del{background:none;border:none;color:#555;font-size:18px;cursor:pointer;padding:4px 8px}
.cart-item-buy{background:#ff4b4b;border:none;color:#fff;font-size:10px;font-weight:700;padding:6px 10px;border-radius:6px;cursor:pointer;white-space:nowrap}
.cart-empty{text-align:center;padding:30px;color:#555;font-size:13px}
.footer{text-align:center;padding:20px;font-size:11px;color:#333;line-height:1.6;border-top:1px solid #1a1a1a;max-width:600px;margin:0 auto}
.footer a{color:#555;text-decoration:underline}
@media(min-width:500px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){.header{padding:16px 24px}.main{padding:20px 24px 100px}.grid{grid-template-columns:repeat(4,1fr)}}
</style>

<div class="header">
  <div class="header-top">
    <div class="logo">와쿠와쿠<span>잡화상단</span></div>
    <div class="badge">SHOP</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="제품 검색..." oninput="render()">
  </div>
  <div class="cats" id="catBar"></div>
</div>

<div class="main">
  <div class="count-bar" id="countLabel"></div>

  <div class="section" id="newSection">
    <div class="section-title"><span class="icon">🆕</span> 최신 등록 제품 <span class="sub">NEW ARRIVALS</span></div>
    <div class="grid" id="newGrid"></div>
    <button class="more-btn" id="newMoreBtn" onclick="showMoreNew()">최신 제품 더보기 ▼</button>
  </div>

  <div class="section" id="popSection">
    <div class="section-title"><span class="icon">🔥</span> 인기 제품 <span class="sub">실시간 클릭수 기준</span></div>
    <div class="grid" id="popGrid"></div>
    <button class="more-btn" id="popMoreBtn" onclick="showMorePop()">인기 제품 더보기 ▼</button>
  </div>

  <div class="section" id="allSection" style="display:none">
    <div class="section-title"><span class="icon">📦</span> 검색 결과</div>
    <div class="grid" id="allGrid"></div>
  </div>

  <div class="empty" id="empty" style="display:none">검색 결과가 없습니다</div>
</div>

<button class="cart-float" onclick="openCart()">🛒<span class="cart-count" id="cartCount">0</span></button>

<div class="cart-panel-bg" id="cartPanelBg" onclick="closeCart(event)">
  <div class="cart-panel" onclick="event.stopPropagation()">
    <h3>🛒 장바구니 <span onclick="clearCart()">전체 삭제</span></h3>
    <div id="cartList"></div>
  </div>
</div>

<div class="footer">

</div>

/* ━━━━━ 아래는 건드리지 마세요 ━━━━━ */

var catOrder = ["전체","컴퓨터/전자","가전/디지털","홈/리빙","게임/취미","패션/의류","뷰티/헬스","식품/음료","자동차/공구","도서/문구","반려동물","스포츠/아웃도어","유아/출산"];
var activeCat = "전체";
var newShowCount = 9;
var popShowCount = 9;

var cart = JSON.parse(localStorage.getItem("waku_cart") || "[]");
var myLikes = JSON.parse(localStorage.getItem("waku_likes") || "[]");

db.ref("clicks").on("value", function(s) { clickData = s.val() || {}; render(); });
db.ref("likes").on("value", function(s) { likeData = s.val() || {}; render(); });

function trackClick(id, url) {
  var c = clickData[id] || 0;
  db.ref("clicks/" + id).set(c + 1);
  window.open(url, "_blank");
}

function toggleLike(id) {
  var idx = myLikes.indexOf(id);
  var current = likeData[id] || 0;
  if (idx >= 0) {
    myLikes.splice(idx, 1);
    db.ref("likes/" + id).set(Math.max(0, current - 1));
  } else {
    myLikes.push(id);
    db.ref("likes/" + id).set(current + 1);
  }
  localStorage.setItem("waku_likes", JSON.stringify(myLikes));
  render();
}

function getLikes(id) { return likeData[id] || 0; }
function getClicks(id) { return clickData[id] || 0; }
function isLiked(id) { return myLikes.indexOf(id) >= 0; }

function addToCart(id) {
  if (cart.indexOf(id) < 0) { cart.push(id); }
  else { cart.splice(cart.indexOf(id), 1); }
  localStorage.setItem("waku_cart", JSON.stringify(cart));
  updateCartCount();
  render();
}
function removeFromCart(id) {
  var idx = cart.indexOf(id);
  if (idx >= 0) cart.splice(idx, 1);
  localStorage.setItem("waku_cart", JSON.stringify(cart));
  updateCartCount();
  renderCart();
  render();
}
function clearCart() {
  cart = [];
  localStorage.setItem("waku_cart", JSON.stringify(cart));
  updateCartCount();
  renderCart();
  render();
}
function isInCart(id) { return cart.indexOf(id) >= 0; }
function updateCartCount() {
  document.getElementById("cartCount").textContent = cart.length;
}
function findProduct(id) {
  for (var i = 0; i < products.length; i++) {
    if (products[i].id === id) return products[i];
  }
  return null;
}
function openCart() {
  renderCart();
  document.getElementById("cartPanelBg").classList.add("open");
}
function closeCart(e) {
  if (e.target === document.getElementById("cartPanelBg")) {
    document.getElementById("cartPanelBg").classList.remove("open");
  }
}
function renderCart() {
  var list = document.getElementById("cartList");
  if (cart.length === 0) {
    list.innerHTML = "<div class=\"cart-empty\">장바구니가 비어있어요</div>";
    return;
  }
  var html = "";
  for (var i = 0; i < cart.length; i++) {
    var item = findProduct(cart[i]);
    if (!item) continue;
    var imgHtml = item.img ? "<img src=\"" + item.img + "\" alt=\"\">" : (item.emoji || "📦");
    var btnText = (item.btn || "쿠팡") + "에서 보기";
    html += "<div class=\"cart-item\">";
    html += "<div class=\"cart-item-img\">" + imgHtml + "</div>";
    html += "<div class=\"cart-item-info\"><div class=\"cart-item-name\">" + item.name + "</div><div class=\"cart-item-price\">" + item.price + "</div></div>";
    html += "<button class=\"cart-item-buy\" onclick=\"trackClick('" + item.id + "','" + item.link + "')\">" + btnText + "</button>";
    html += "<button class=\"cart-item-del\" onclick=\"removeFromCart('" + item.id + "')\">✕</button>";
    html += "</div>";
  }
  list.innerHTML = html;
}

function makeCard(item, badge) {
  var imgPart = item.img ? "<img src=\"" + item.img + "\" alt=\"\">" : (item.emoji || "📦");
  var btnText = (item.btn || "쿠팡") + "에서 보기 →";
  var badgeHtml = "";
  if (badge === "new") badgeHtml = "<span class=\"card-new\">NEW</span>";
  else if (badge === "rank") badgeHtml = "<span class=\"card-rank\">" + item._rank + "위</span>";
  var views = getClicks(item.id);
  var likes = getLikes(item.id);
  var liked = isLiked(item.id);
  var inCart = isInCart(item.id);
  var html = "<div class=\"card\">";
  html += "<div class=\"card-img-wrap\"><div class=\"card-img\">" + imgPart + "</div>" + badgeHtml + "</div>";
  html += "<div class=\"card-body\">";
  html += "<div class=\"card-cat\">" + item.cat + "</div>";
  html += "<div class=\"card-name\">" + item.name + "</div>";
  html += "<div class=\"card-price\">" + item.price + "</div>";
  html += "<div class=\"card-views\"><span class=\"dot\">●</span> 조회수 " + views + "</div>";
  html += "<div class=\"card-actions\">";
  html += "<button class=\"like-btn" + (liked ? " liked" : "") + "\" onclick=\"toggleLike('" + item.id + "')\"><span class=\"heart\">" + (liked ? "❤️" : "🤍") + "</span>" + likes + "</button>";
  html += "<button class=\"cart-btn" + (inCart ? " in-cart" : "") + "\" onclick=\"addToCart('" + item.id + "')\">" + (inCart ? "✓ 담김" : "🛒 담기") + "</button>";
  html += "</div>";
  html += "<a class=\"buy-btn\" href=\"javascript:void(0)\" onclick=\"trackClick('" + item.id + "','" + item.link + "')\">" + btnText + "</a>";
  html += "</div></div>";
  return html;
}

function render() {
  var q = document.getElementById("searchInput").value.toLowerCase();
  var usedCats = {};
  var i;
  for (i = 0; i < products.length; i++) { usedCats[products[i].cat] = true; }
  var cats = [];
  for (i = 0; i < catOrder.length; i++) {
    if (catOrder[i] === "전체" || usedCats[catOrder[i]]) cats.push(catOrder[i]);
  }
  var catHtml = "";
  for (i = 0; i < cats.length; i++) {
    var c = cats[i];
    catHtml += "<button class=\"cat-btn" + (c === activeCat ? " active" : "") + "\" onclick=\"setCat('" + c + "')\">" + c + "</button>";
  }
  document.getElementById("catBar").innerHTML = catHtml;
  var filtered = [];
  for (i = 0; i < products.length; i++) {
    var p = products[i];
    var matchCat = (activeCat === "전체") || (p.cat === activeCat);
    var matchQ = !q || p.name.toLowerCase().indexOf(q) >= 0 || p.cat.toLowerCase().indexOf(q) >= 0;
    if (matchCat && matchQ) filtered.push(p);
  }
  document.getElementById("countLabel").textContent = "전체 " + filtered.length + "개 제품";
  updateCartCount();
  var isSearching = q.length > 0;
  if (filtered.length === 0) {
    document.getElementById("empty").style.display = "block";
    document.getElementById("newSection").style.display = "none";
    document.getElementById("popSection").style.display = "none";
    document.getElementById("allSection").style.display = "none";
    return;
  }
  document.getElementById("empty").style.display = "none";
  if (isSearching) {
    document.getElementById("newSection").style.display = "none";
    document.getElementById("popSection").style.display = "none";
    document.getElementById("allSection").style.display = "block";
    var allHtml = "";
    for (i = 0; i < filtered.length; i++) { allHtml += makeCard(filtered[i], ""); }
    document.getElementById("allGrid").innerHTML = allHtml;
    return;
  }
  document.getElementById("allSection").style.display = "none";
  document.getElementById("newSection").style.display = "block";
  document.getElementById("popSection").style.display = "block";
  var newItems = filtered.slice(0, Math.min(newShowCount, 20));
  var newHtml = "";
  for (i = 0; i < newItems.length; i++) { newHtml += makeCard(newItems[i], "new"); }
  document.getElementById("newGrid").innerHTML = newHtml;
  document.getElementById("newMoreBtn").style.display = (newShowCount < filtered.length && newShowCount < 20) ? "block" : "none";
  var byPop = filtered.slice();
  byPop.sort(function(a, b) { return getClicks(b.id) - getClicks(a.id); });
  var popItems = byPop.slice(0, Math.min(popShowCount, 20));
  for (i = 0; i < popItems.length; i++) { popItems[i]._rank = i + 1; }
  var popHtml = "";
  for (i = 0; i < popItems.length; i++) { popHtml += makeCard(popItems[i], "rank"); }
  document.getElementById("popGrid").innerHTML = popHtml;
  document.getElementById("popMoreBtn").style.display = (popShowCount < byPop.length && popShowCount < 20) ? "block" : "none";
}

function setCat(c) { activeCat = c; newShowCount = 9; popShowCount = 9; render(); }
function showMoreNew() { newShowCount = Math.min(newShowCount + 9, 20); render(); }
function showMorePop() { popShowCount = Math.min(popShowCount + 9, 20); render(); }
</script>
